apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "paperclip.configMapName" . }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
data:
  NODE_ENV: "production"
  HOST: "0.0.0.0"
  PORT: {{ .Values.service.containerPort | quote }}
  SERVE_UI: {{ .Values.server.serveUi | quote }}
  PAPERCLIP_HOME: "/paperclip"
  PAPERCLIP_INSTANCE_ID: {{ .Values.server.instanceId | quote }}
  PAPERCLIP_CONFIG: "/paperclip/instances/default/config.json"
  PAPERCLIP_DEPLOYMENT_MODE: {{ .Values.server.deploymentMode | quote }}
  PAPERCLIP_DEPLOYMENT_EXPOSURE: {{ .Values.server.deploymentExposure | quote }}
  {{- if .Values.server.publicUrl }}
  PAPERCLIP_PUBLIC_URL: {{ .Values.server.publicUrl | quote }}
  {{- end }}
  {{- if .Values.server.allowedHostnames }}
  PAPERCLIP_ALLOWED_HOSTNAMES: {{ .Values.server.allowedHostnames | quote }}
  {{- end }}
  PAPERCLIP_AUTH_BASE_URL_MODE: {{ .Values.server.authBaseUrlMode | quote }}
  PAPERCLIP_AUTH_DISABLE_SIGN_UP: {{ .Values.server.authDisableSignUp | quote }}
  PAPERCLIP_STORAGE_PROVIDER: {{ .Values.storage.provider | quote }}
  {{- if eq .Values.storage.provider "s3" }}
  PAPERCLIP_STORAGE_S3_BUCKET: {{ .Values.storage.s3.bucket | quote }}
  PAPERCLIP_STORAGE_S3_REGION: {{ .Values.storage.s3.region | quote }}
  {{- if .Values.storage.s3.endpoint }}
  PAPERCLIP_STORAGE_S3_ENDPOINT: {{ .Values.storage.s3.endpoint | quote }}
  {{- end }}
  {{- if .Values.storage.s3.prefix }}
  PAPERCLIP_STORAGE_S3_PREFIX: {{ .Values.storage.s3.prefix | quote }}
  {{- end }}
  PAPERCLIP_STORAGE_S3_FORCE_PATH_STYLE: {{ .Values.storage.s3.forcePathStyle | quote }}
  {{- end }}
  PAPERCLIP_DB_BACKUP_ENABLED: {{ .Values.backup.builtin.enabled | quote }}
  PAPERCLIP_DB_BACKUP_INTERVAL_MINUTES: {{ .Values.backup.builtin.intervalMinutes | quote }}
  PAPERCLIP_DB_BACKUP_RETENTION_DAYS: {{ .Values.backup.builtin.retentionDays | quote }}
  PAPERCLIP_DB_BACKUP_DIR: {{ .Values.backup.builtin.directory | quote }}
  HEARTBEAT_SCHEDULER_ENABLED: {{ .Values.server.heartbeatSchedulerEnabled | quote }}
  HEARTBEAT_SCHEDULER_INTERVAL_MS: {{ .Values.server.heartbeatSchedulerIntervalMs | quote }}
  PAPERCLIP_SECRETS_PROVIDER: {{ .Values.secrets.provider | quote }}
  PAPERCLIP_SECRETS_STRICT_MODE: {{ .Values.secrets.strictMode | quote }}
  PAPERCLIP_ENABLE_COMPANY_DELETION: {{ .Values.server.companyDeletionEnabled | quote }}
  PAPERCLIP_MIGRATION_PROMPT: "never"
  PAPERCLIP_MIGRATION_AUTO_APPLY: "true"
  OPENCODE_ALLOW_ALL_MODELS: "true"
