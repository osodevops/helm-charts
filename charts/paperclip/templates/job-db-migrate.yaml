apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "paperclip.fullname" . }}-db-migrate
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        {{- include "paperclip.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "paperclip.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      restartPolicy: Never
      {{- if .Values.postgresql.enabled }}
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "paperclip.fullname" . }}-postgresql 5432; do
                echo "waiting for postgresql..."
                sleep 2
              done
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "paperclip.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - node
            - --import
            - ./server/node_modules/tsx/dist/loader.mjs
            - -e
            - "import { applyPendingMigrations } from '@paperclipai/db'; await applyPendingMigrations(process.env.DATABASE_URL);"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "paperclip.dbSecretName" . }}
                  key: database-url
            - name: NODE_ENV
              value: "production"
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
