{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "paperclip.fullname" . }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "paperclip.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
          podSelector: {}
      ports:
        - port: {{ .Values.service.containerPort }}
          protocol: TCP
  egress:
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # PostgreSQL
    - ports:
        - port: 5432
          protocol: TCP
    # HTTPS (S3, AI provider APIs, external services)
    - ports:
        - port: 443
          protocol: TCP
{{- end }}
