{{- if not (and (not .Values.postgresql.enabled) .Values.postgresql.external.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "paperclip.fullname" . }}-db
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.postgresql.enabled }}
  {{- $host := printf "%s-postgresql" (include "paperclip.fullname" .) }}
  database-url: "postgres://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password | default "changeme" }}@{{ $host }}:5432/{{ .Values.postgresql.auth.database }}"
  {{- else }}
  {{- $base := printf "postgres://%s:%s@%s:%s/%s?sslmode=%s" .Values.postgresql.external.username (.Values.postgresql.external.password | default "changeme") .Values.postgresql.external.host (.Values.postgresql.external.port | toString) .Values.postgresql.external.database .Values.postgresql.external.sslMode }}
  {{- if .Values.postgresql.external.connectionPooling }}
  database-url: "{{ $base }}&prepare=false"
  {{- else }}
  database-url: "{{ $base }}"
  {{- end }}
  {{- end }}
{{- end }}
