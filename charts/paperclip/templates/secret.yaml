{{- if not (and .Values.secrets.existingBetterAuthSecret .Values.secrets.existingMasterKeySecret .Values.secrets.existingApiKeysSecret) }}
{{- $secretName := include "paperclip.secretName" . -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $betterAuthSecret := "" -}}
{{- $masterKey := "" -}}
{{- if $existingSecret -}}
  {{- $betterAuthSecret = index $existingSecret.data "better-auth-secret" | b64dec -}}
  {{- $masterKey = index $existingSecret.data "master-key" | b64dec -}}
{{- end -}}
{{- if .Values.secrets.betterAuthSecret -}}
  {{- $betterAuthSecret = .Values.secrets.betterAuthSecret -}}
{{- else if not $betterAuthSecret -}}
  {{- $betterAuthSecret = randAlphaNum 64 -}}
{{- end -}}
{{- if .Values.secrets.masterKey -}}
  {{- $masterKey = .Values.secrets.masterKey -}}
{{- else if not $masterKey -}}
  {{- $masterKey = randAlphaNum 32 | b64enc -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if not .Values.secrets.existingBetterAuthSecret }}
  better-auth-secret: {{ $betterAuthSecret | b64enc | quote }}
  {{- end }}
  {{- if not .Values.secrets.existingMasterKeySecret }}
  master-key: {{ $masterKey | b64enc | quote }}
  {{- end }}
  {{- if and (not .Values.secrets.existingApiKeysSecret) .Values.secrets.anthropicApiKey }}
  anthropic-api-key: {{ .Values.secrets.anthropicApiKey | b64enc | quote }}
  {{- end }}
  {{- if and (not .Values.secrets.existingApiKeysSecret) .Values.secrets.openaiApiKey }}
  openai-api-key: {{ .Values.secrets.openaiApiKey | b64enc | quote }}
  {{- end }}
{{- end }}
