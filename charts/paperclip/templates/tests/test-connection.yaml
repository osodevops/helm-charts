apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "paperclip.fullname" . }}-test-connection"
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: curlimages/curl:latest
      command:
        - sh
        - -c
        - |
          curl -sf http://{{ include "paperclip.fullname" . }}:{{ .Values.service.port }}/api/health
