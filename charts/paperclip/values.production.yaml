# Production overlay example
# Usage: helm upgrade paperclip ./paperclip -f values.production.yaml

replicaCount: 1

server:
  deploymentMode: "authenticated"
  deploymentExposure: "private"
  publicUrl: "https://paperclip.example.com"
  authDisableSignUp: true
  companyDeletionEnabled: false

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
  hosts:
    - host: paperclip.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: paperclip-tls
      hosts:
        - paperclip.example.com

postgresql:
  enabled: false
  external:
    host: "paperclip-db.abc123.eu-west-2.rds.amazonaws.com"
    port: 5432
    database: "paperclip"
    username: "paperclip"
    existingSecret: "paperclip-db-credentials"
    sslMode: "require"
    connectionPooling: false

storage:
  provider: "s3"
  s3:
    bucket: "paperclip-assets"
    region: "eu-west-2"

secrets:
  existingBetterAuthSecret: "paperclip-auth-secret"
  existingMasterKeySecret: "paperclip-master-key"
  existingApiKeysSecret: "paperclip-api-keys"

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT:role/paperclip-s3"

persistence:
  enabled: true
  size: 50Gi
  storageClass: "gp3"

backup:
  builtin:
    enabled: true
    intervalMinutes: 30
    retentionDays: 30
  external:
    enabled: true
    schedule: "0 */6 * * *"
    s3Bucket: "paperclip-db-backups"
    s3Region: "eu-west-2"

networkPolicy:
  enabled: true

podDisruptionBudget:
  enabled: true
  minAvailable: 1

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "4"
    memory: 4Gi
